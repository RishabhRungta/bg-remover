<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutoutAI - Background Remover</title>

<style>
:root {
  --primary: #6C63FF;
  --secondary: #00C9FF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* BACKGROUND */
body {
  min-height: 100vh;
  min-height: 100svh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: linear-gradient(-45deg, #667eea, #764ba2, #00c9ff);
  background-size: 400% 400%;
  animation: bg 10s ease infinite;
}

@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* HEADER */
.header {
  position: absolute;
  top: 20px;
  left: 30px;
  color: white;
  font-size: 22px;
  font-weight: 600;
}

/* APP */
.app {
  display: flex;
  width: min(900px, 95%);
  height: 520px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

/* PREVIEW */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  color: white;
  overflow: hidden;
}

.preview-panel img {
  max-width: 100%;
  max-height: 260px;
  object-fit: contain;
  border-radius: 12px;
  margin-top: 10px;
}

/* CONTROL */
.control-panel {
  width: 320px;
  padding: 25px;
  background: rgba(255,255,255,0.95);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* UPLOAD */
.upload-box {
  border: 2px dashed #aaa;
  padding: 25px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  border-color: var(--primary);
  background: #f5f6ff;
}

input {
  display: none;
}

/* BUTTONS */
button {
  margin-top: 12px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
}

.secondary-btn {
  background: #444;
}

/* DOWNLOAD */
.download-btn {
  margin-top: 10px;
  padding: 12px;
  background: var(--secondary);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  display: block;
  text-align: center;
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 13px;
  text-align: center;
}

/* LOADER */
.loader {
  display: none;
  margin-top: 10px;
  text-align: center;
}

.spinner {
  width: 30px;
  height: 30px;
  border: 4px solid #ccc;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width: 768px) {

  body {
    align-items: flex-start;
  }

  .app {
    flex-direction: column;
    width: 100%;
    height: auto;
  }

  .preview-panel {
    min-height: 240px;
  }

  .control-panel {
    width: 100%;
  }

  .header {
    position: static;
    text-align: center;
    margin-bottom: 10px;
  }
}
</style>
</head>

<body>

<div class="header">CutoutAI</div>

<div class="app">

  <!-- PREVIEW -->
  <div class="preview-panel" id="previewPanel">
    <h3>No Image Selected</h3>
  </div>

  <!-- CONTROLS -->
  <div class="control-panel">

    <label class="upload-box">
      Upload Image
      <input type="file" id="fileInput" accept="image/*">
    </label>

    <button onclick="removeBackground()">Remove Background</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <div class="status" id="status"></div>

  </div>

</div>

<script>
const API_KEY = "G7F2FQNgmqpzGQeMjeXNjjn1";

let selectedFile;

const previewPanel = document.getElementById("previewPanel");
const statusText = document.getElementById("status");

/* FILE INPUT */
document.getElementById("fileInput").addEventListener("change", e => {
  selectedFile = e.target.files[0];
  showPreview(selectedFile);
});

/* PREVIEW */
function showPreview(file){
  if(!file) return;

  const url = URL.createObjectURL(file);

  previewPanel.innerHTML = `
    <h3>Preview</h3>
    <img src="${url}">
  `;
}

/* REMOVE BG */
async function removeBackground(){

  if(!selectedFile){
    statusText.innerText = "⚠️ Please upload an image first";
    return;
  }

  document.getElementById("loader").style.display = "block";
  statusText.innerText = "Processing...";

  const formData = new FormData();
  formData.append("image_file", selectedFile);

  try {
    const res = await fetch("https://api.remove.bg/v1.0/removebg", {
      method: "POST",
      headers: {
        "X-Api-Key": API_KEY
      },
      body: formData
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    previewPanel.innerHTML = `
      <h3>Result 🎉</h3>
      <img src="${url}">
      <a class="download-btn" href="${url}" download="cutout.png">Download</a>
      <button class="secondary-btn" onclick="resetApp()">New Image</button>
    `;

    statusText.innerText = "Done!";

  } catch (err) {
    statusText.innerText = "Error processing image";
  }

  document.getElementById("loader").style.display = "none";
}

/* RESET */
function resetApp(){
  selectedFile = null;
  document.getElementById("fileInput").value = "";
  previewPanel.innerHTML = "<h3>No Image Selected</h3>";
  statusText.innerText = "";
}
</script>

</body>
</html>
